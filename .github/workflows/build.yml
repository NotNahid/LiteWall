name: Build LiteWall EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4   # updated

    - name: Set up Python
      uses: actions/setup-python@v5   # updated
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executable
      run: python build.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4   # FIXED HERE
      with:
        name: LiteWall-EXE
        path: dist/*.exe
